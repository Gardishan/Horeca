name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Detect dependency graph support
        id: dependency_graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/dependency-graph/sbom")"
          if [ "${status}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Dependency Graph is unavailable (HTTP ${status}); using npm audit fallback."
          fi
      - if: steps.dependency_graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
      - if: steps.dependency_graph.outputs.enabled != 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - if: steps.dependency_graph.outputs.enabled != 'true'
        run: npm ci
      - if: steps.dependency_graph.outputs.enabled != 'true'
        run: npm run security:audit

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  sbom:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run security:sbom
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
      - uses: actions/attest@v4
        with:
          subject-path: package-lock.json
          sbom-path: sbom.cdx.json
