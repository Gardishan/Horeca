name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://horeca:horeca@localhost:5432/horeca?schema=public
      AUTH_SECRET: ci-only-secret-with-at-least-thirty-two-characters
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:validate
      - run: npm run typecheck
      - run: npm test
      - run: npm run lint
      - run: npm run build

