version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Almaty
    open-pull-requests-limit: 5
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    # Major upgrades are coordinated in a tracked engineering issue because
    # the Node/Next/TypeScript/ESLint/Prisma compatibility matrix must move as
    # one reviewed change. Dependabot security updates are unaffected by this
    # version-update filter.
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Almaty
    open-pull-requests-limit: 5
