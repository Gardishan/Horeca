services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: horeca
      POSTGRES_USER: horeca
      POSTGRES_PASSWORD: horeca
    ports:
      - "5432:5432"
    volumes:
      - horeca_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horeca -d horeca"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  horeca_postgres_data:

